name: CI/CD Pipeline - Currency Service

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  # ================================
  # STAGE 1: Build Currency Service
  # ================================
  build-currency-service:
    name: Build Currency Service
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push Currency Service
        uses: docker/build-push-action@v5
        with:
          context: ./src/currencyservice
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/currencyservice:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/currencyservice:${{ github.sha }}

  # ================================
  # STAGE 2: Security Scan
  # ================================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build-currency-service

    steps:
      - name: Scan Currency Service
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKERHUB_USERNAME }}/currencyservice:latest'
          format: 'table'
          severity: 'CRITICAL,HIGH'

  # ================================
  # STAGE 3: Pipeline Report
  # ================================
  pipeline-report:
    name: Pipeline Report
    runs-on: ubuntu-latest
    needs: [build-currency-service, security-scan]
    if: always()

    steps:
      - name: Summary
        run: |
          echo "╔═══════════════════════════════════════════╗"
          echo "║   CURRENCY SERVICE CI/CD COMPLETE! 🎉    ║"
          echo "╠═══════════════════════════════════════════╣"
          echo "║                                           ║"
          echo "║  Build:     ${{ needs.build-currency-service.result }}"
          echo "║  Security:  ${{ needs.security-scan.result }}"
          echo "║                                           ║"
          echo "║  🇮🇳 INR (Indian Rupee) Support Added!    ║"
          echo "║                                           ║"
          echo "║  Image: currencyservice:${{ github.sha }}"
          echo "║                                           ║"
          echo "╚═══════════════════════════════════════════╝"