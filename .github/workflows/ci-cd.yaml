name: CI/CD Pipeline - Frontend (INR Support)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  # ================================
  # STAGE 1: Build Frontend
  # ================================
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./src/frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/frontend:${{ github.sha }}

  # ================================
  # STAGE 2: Security Scan
  # ================================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build-frontend

    steps:
      - name: Scan Frontend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKERHUB_USERNAME }}/frontend:latest'
          format: 'table'
          severity: 'CRITICAL,HIGH'

  # ================================
  # STAGE 3: Pipeline Report
  # ================================
  pipeline-report:
    name: Pipeline Report
    runs-on: ubuntu-latest
    needs: [build-frontend, security-scan]
    if: always()

    steps:
      - name: Summary
        run: |
          echo "╔═══════════════════════════════════════════╗"
          echo "║   FRONTEND CI/CD COMPLETE! 🎉            ║"
          echo "╠═══════════════════════════════════════════╣"
          echo "║                                           ║"
          echo "║  Build:     ${{ needs.build-frontend.result }}"
          echo "║  Security:  ${{ needs.security-scan.result }}"
          echo "║                                           ║"
          echo "║  🇮🇳 INR (Indian Rupee) Support Added!    ║"
          echo "║                                           ║"
          echo "║  Commit: ${{ github.sha }}"
          echo "║  Author: ${{ github.actor }}"
          echo "║                                           ║"
          echo "╚═══════════════════════════════════════════╝"