name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  # ================================
  # JOB 1: Build and Push Images
  # ================================
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push Review Service
        uses: docker/build-push-action@v5
        with:
          context: ./src/reviewservice
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/reviewservice:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/reviewservice:${{ github.sha }}

      - name: Build & Push Inventory Service
        uses: docker/build-push-action@v5
        with:
          context: ./src/inventoryservice
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/inventoryservice:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/inventoryservice:${{ github.sha }}

      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./src/frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/frontend:${{ github.sha }}

  # ================================
  # JOB 2: Security Scan
  # ================================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Scan Review Service
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKERHUB_USERNAME }}/reviewservice:latest'
          format: 'table'
          severity: 'CRITICAL,HIGH'

      - name: Scan Inventory Service
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKERHUB_USERNAME }}/inventoryservice:latest'
          format: 'table'
          severity: 'CRITICAL,HIGH'

  # ================================
  # JOB 3: Deploy Summary
  # ================================
  deploy-summary:
    name: Pipeline Summary
    runs-on: ubuntu-latest
    needs: [build-and-push, security-scan]
    if: always()

    steps:
      - name: Pipeline Result
        run: |
          echo "=================================="
          echo "  CI/CD PIPELINE COMPLETE! 🎉"
          echo "=================================="
          echo ""
          echo "Build:    ${{ needs.build-and-push.result }}"
          echo "Security: ${{ needs.security-scan.result }}"
          echo ""
          echo "Images pushed to Docker Hub:"
          echo "  - reviewservice:${{ github.sha }}"
          echo "  - inventoryservice:${{ github.sha }}"
          echo "  - frontend:${{ github.sha }}"
          echo "=================================="