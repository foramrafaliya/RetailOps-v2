name: CI/CD Pipeline - GitOps Auto-Update

on:
  push:
    branches: [ main ]
    # Ignore commits made by the bot itself to prevent infinite loops
    paths-ignore:
      - 'kubernetes-manifests/**'

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

permissions:
  contents: write # REQUIRED: Allows the bot to push changes back to the repo

jobs:

  # ================================
  # STAGE 1: Build & Push Images
  # ================================
  build-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 1. Frontend
      - name: Build Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./src/frontend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/frontend:${{ github.sha }}

      # 2. Review Service
      - name: Build Review Service
        uses: docker/build-push-action@v5
        with:
          context: ./src/reviewservice
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/reviewservice:${{ github.sha }}

      # 3. Inventory Service
      - name: Build Inventory Service
        uses: docker/build-push-action@v5
        with:
          context: ./src/inventoryservice
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/inventoryservice:${{ github.sha }}

      # 4. Currency Service
      - name: Build Currency Service
        uses: docker/build-push-action@v5
        with:
          context: ./src/currencyservice
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/currencyservice:${{ github.sha }}

  # ================================
  # STAGE 2: Update Kubernetes Manifests
  # ================================
  update-manifests:
    name: Update Manifests (GitOps)
    runs-on: ubuntu-latest
    needs: build-push
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Image Tags in YAML
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          
          echo "Updating manifests to image tag: ${{ github.sha }}"
          
          # Logic: Find 'image: username/service:...' and replace with 'image: username/service:sha'
          
          # Frontend
          sed -i "s|image: ${{ secrets.DOCKERHUB_USERNAME }}/frontend:.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/frontend:${{ github.sha }}|g" kubernetes-manifests/frontend.yaml
          
          # Review Service
          sed -i "s|image: ${{ secrets.DOCKERHUB_USERNAME }}/reviewservice:.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/reviewservice:${{ github.sha }}|g" kubernetes-manifests/reviewservice.yaml
          
          # Inventory Service
          sed -i "s|image: ${{ secrets.DOCKERHUB_USERNAME }}/inventoryservice:.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/inventoryservice:${{ github.sha }}|g" kubernetes-manifests/inventoryservice.yaml
          
          # Currency Service
          sed -i "s|image: ${{ secrets.DOCKERHUB_USERNAME }}/currencyservice:.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/currencyservice:${{ github.sha }}|g" kubernetes-manifests/currencyservice.yaml
          
          # Check if there are changes
          if [[ -n $(git status -s) ]]; then
            git add kubernetes-manifests/
            git commit -m "ops: update images to version ${{ github.sha }}"
            git push
            echo "✅ Manifests updated and pushed!"
          else
            echo "⚠️ No changes to manifests detected."
          fi

  # ================================
  # STAGE 3: Final Report
  # ================================
  report:
    name: Pipeline Report
    runs-on: ubuntu-latest
    needs: [update-manifests]
    if: always()
    steps:
      - run: |
          echo "🚀 CI/CD Pipeline Complete!"
          echo "✅ Images pushed with tag: ${{ github.sha }}"
          echo "✅ Manifests updated in GitHub"
          echo "👉 ArgoCD will detect this change and sync automatically!"